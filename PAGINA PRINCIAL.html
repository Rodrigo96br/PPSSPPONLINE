<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meu Site</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#0f0f0f;
  color:white;
}

header{
  background:#111;
  padding:20px;
  text-align:center;
  border-bottom:2px solid #00ff88;
}

header h1{
  font-size:32px;
  color:#00ff88;
}

header p{
  margin-top:10px;
  color:#ccc;
}

.banner{
  width:100%;
  height:300px;
  background:url('https://picsum.photos/1200/500') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
}

.banner h2{
  background:rgba(0,0,0,0.6);
  padding:15px 25px;
  border-radius:10px;
  font-size:30px;
}

.container{
  padding:40px 20px;
  text-align:center;
}

.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}

.card{
  background:#1b1b1b;
  width:250px;
  padding:20px;
  border-radius:15px;
  transition:0.3s;
  border:1px solid #333;
}

.card:hover{
  transform:translateY(-5px);
  border-color:#00ff88;
}

.card h3{
  margin-bottom:10px;
  color:#00ff88;
}

footer{
  margin-top:40px;
  background:#111;
  text-align:center;
  padding:20px;
  color:#888;
}
</style>
</head>

<body>

<header>
  <h1>MEU SITE</h1>
  <p>Site simples hospedado no GitHub</p>
</header>

<div class="banner">
  <h2>BEM-VINDO</h2>
</div>

<section class="container">
  <h2>Meus Conteúdos</h2>

  <div class="cards">

    <div class="card">
      <h3>Filmes</h3>
      <p>Área de filmes do site.</p>
    </div>

    <div class="card">
      <h3>Séries</h3>
      <p>Área de séries do site.</p>
    </div>

    <div class="card">
      <h3>Jogos</h3>
      <p>Área de jogos do site.</p>
    </div>

  </div>
</section>

<footer>
  © 2026 - Meu Site
</footer>

</body>
</html>
