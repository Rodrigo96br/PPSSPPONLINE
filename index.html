<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
/* BANNER FIXO */
.top-banner{
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 999;
}
.top-banner img {
  width: 100%;
  height: auto;
  display: block;
}
/* EMPURRAR CONTEÚDO PRA BAIXO */
body {
  margin: 10;
  padding-top: 65px; /* ajusta conforme altura do banner */
}
.post-date,
.date-header,
.timestamp,
.blog-date-header {
  display: none !important;
}
  .to{
    opacity: 1;
    transform:translateY(0);
  }
body{
  margin: 0;
  padding: 0;
  background-image: url('https://i.pinimg.com/736x/5d/49/05/5d490537fb1d96a6e5666d2fa630703d.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}
.app-menu {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #000000;
  display: flex;
  justify-content: space-around;
  padding: 1px 0;
  box-shadow: -1 0px 0px rgba(0,0,0,0.1);
  z-index: 999;
}
.app-menu a {
  text-decoration: none;
  color: #0000;
  font-size: -0px;
  text-align: center;
  flex: 1;
}
.box {
  background: #000000;
  width: 50px;
  height: 50px;
  margin: auto;
  border-radius: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.3s;
}
.icon-img {
  width: 50px;
  height: 50px;
}
.app-menu a:active .box {
  transform: scale(0.9);
}
.app-menu .active .box {
  background: #000000;
}
.app-menu .active span {
  color: #ff3b3b;
}
.box:hover {
  transform: translateY(-0px);
}
    
/* TOPO */
header{
    background:#111;
    padding:20px;
    text-align:center;
    border-bottom:2px solid #00ff99;
}

header h1{
    color:#00ff99;
    font-size:35px;
}

header p{
    color:#bbb;
    margin-top:10px;
}

/* BANNER */

.banner{
    width:100%;
    height:300px;
    background:url('https://picsum.photos/1200/600') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
}

.banner h2{
    background:rgba(0,0,0,0.7);
    padding:15px 25px;
    border-radius:10px;
    font-size:30px;
}

/* CONTEÚDO */

.container{
    padding:40px 20px;
    text-align:center;
}

.container h2{
    margin-bottom:30px;
    color:#00ff99;
}

/* CARDS */

.cards{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    background:#1a1a1a;
    width:250px;
    padding:20px;
    border-radius:15px;
    transition:0.3s;
    border:1px solid #333;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#00ff99;
}

.card img{
    width:100%;
    border-radius:10px;
}

.card h3{
    margin-top:15px;
    color:#00ff99;
}

.card p{
    margin-top:10px;
    color:#ccc;
}

/* BOTÃO */

.botao{
    display:inline-block;
    margin-top:15px;
    padding:10px 20px;
    background:#00ff99;
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

/* RODAPÉ */

footer{
    background:#111;
    padding:20px;
    text-align:center;
    margin-top:40px;
    color:#777;
}

</style>
</head>

<body>

<header>

<section class="banner">

        </div>

        <div class="card">

    </div>

</section>
