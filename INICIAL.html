<style>
*{
    margin:0;

body {
  margin: 10;

  background-image: url('https://i.pinimg.com/736x/5d/49/05/5d490537fb1d96a6e5666d2fa630703d.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}
/* BANNER FIXO */
.top-banner{
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 999;
}
.top-banner img {
  width: 100%;
  height: auto;
  display: block;}

.post-date,
.date-header,
.timestamp,
.blog-date-header {
  display: none !important;}

  .to{
    opacity: 1;
    transform:translateY(0);
}
.app-menu {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #000000;
  display: flex;
  justify-content: space-around;
  padding: 1px 0;
  box-shadow: -1 0px 0px rgba(0,0,0,0.1);
  z-index: 999;
}
.app-menu a {
  text-decoration: none;
  color: #0000;
  font-size: -0px;
  text-align: center;
  flex: 1;
}
.box {
  background: #000000;
  width: 50px;
  height: 50px;
  margin: auto;
  border-radius: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.3s;
}
.icon-img {
  width: 50px;
  height: 50px;
}
.app-menu a:active .box {
  transform: scale(0.9);
}
.app-menu .active .box {
  background: #000000;
}
.app-menu .active span {
  color: #ff3b3b;
}
.box:hover {
  transform: translateY(-0px);
}
<style>
.slider {
  position: relative;
  max-width: 100%;
  overflow: hidden;
  border-radius: 20px;
}

.slides {
  display: flex;
  transition: transform 0.5s ease;
}

.slide {
  min-width: 100%;
}

.slide img {
  width: 100%;
  border-radius: 20px;
  height: 100px;
  object-fit: cover;
}

/* Botões */
.prev, .next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: #ffff;
  border: none;
  font-size: 25px;
  padding: 10px;
  cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }
</style>
</head>

  <button class="prev" onclick="mudarSlide(-1)">❮</button>
  <button class="next" onclick="mudarSlide(1)">❯</button></div>

<b><script>
let index = 0;

function mudarSlide(direcao){
  const slides = document.getElementById("slides");
  const total = slides.children.length;

  index += direcao;

  if(index < 0) index = total - 1;
  if(index >= total) index = 0;

  slides.style.transform = "translateX(" + (-index * 100) + "%)";
}

// automático
setInterval(() => {
  mudarSlide(1);
}, 3000);
</script>
