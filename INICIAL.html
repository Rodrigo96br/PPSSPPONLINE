.box:hover {

<style>
.slider {
  position: relative;
  max-width: 100%;
  overflow: hidden;
  border-radius: 20px;
  }
.slides {
  display: flex;
  transition: transform 0.5s ease;
}

.slide {
  min-width: 100%;
}
.slide img {
  width: 100%;
  border-radius: 20px;
  height: 200px;
  object-fit: cover;
}
/* Botões */
.prev, .next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: #ffff;
  border: none;
  font-size: 25px;
  padding: 10px;
  cursor: pointer;
}
.prev { left: 10px; }
.next { right: 10px; }
</style>

<b><script>
let index = 0;

function mudarSlide(direcao){
  const slides = document.getElementById("slides");
  const total = slides.children.length;

  index += direcao;

  if(index < 0) index = total - 1;
  if(index >= total) index = 0;

  slides.style.transform = "translateX(" + (-index * 100) + "%)";
}

// automático
setInterval(() => {
  mudarSlide(1);
}, 3000);
</script>
