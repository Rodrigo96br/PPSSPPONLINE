<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Site</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d0d0d;
    font-family:Arial, sans-serif;
    color:white;
}

/* TOPO */

header{
    background:#111;
    padding:20px;
    text-align:center;
    border-bottom:2px solid #00ff99;
}

header h1{
    color:#00ff99;
    font-size:35px;
}

header p{
    color:#bbb;
    margin-top:10px;
}

/* BANNER */

.banner{
    width:100%;
    height:300px;
    background:url('https://picsum.photos/1200/600') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
}

.banner h2{
    background:rgba(0,0,0,0.7);
    padding:15px 25px;
    border-radius:10px;
    font-size:30px;
}

/* CONTEÚDO */

.container{
    padding:40px 20px;
    text-align:center;
}

.container h2{
    margin-bottom:30px;
    color:#00ff99;
}

/* CARDS */

.cards{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    background:#1a1a1a;
    width:250px;
    padding:20px;
    border-radius:15px;
    transition:0.3s;
    border:1px solid #333;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#00ff99;
}

.card img{
    width:100%;
    border-radius:10px;
}

.card h3{
    margin-top:15px;
    color:#00ff99;
}

.card p{
    margin-top:10px;
    color:#ccc;
}

/* BOTÃO */

.botao{
    display:inline-block;
    margin-top:15px;
    padding:10px 20px;
    background:#00ff99;
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

/* RODAPÉ */

footer{
    background:#111;
    padding:20px;
    text-align:center;
    margin-top:40px;
    color:#777;
}

</style>
</head>

<body>

<header>
    <h1>MEU SITE</h1>
    <p>Site criado para GitHub Pages</p>
</header>

<section class="banner">
    <h2>BEM-VINDO</h2>
</section>

<section class="container">

    <h2>CONTEÚDOS</h2>

    <div class="cards">

        <div class="card">
            <img src="https://picsum.photos/300/200?1">
            <h3>Filmes</h3>
            <p>Veja os melhores filmes.</p>
            <a href="#" class="botao">ENTRAR</a>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?2">
            <h3>Séries</h3>
            <p>As séries mais populares.</p>
            <a href="#" class="botao">ENTRAR</a>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?3">
            <h3>Jogos</h3>
            <p>Área gamer do site.</p>
            <a href="#" class="botao">ENTRAR</a>
        </div>

    </div>

</section>

<footer>
    © 2026 - Meu Site
</footer>

</body>
</html>
